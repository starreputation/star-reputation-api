<div id="panel">

<h2 id="welcome"></h2>

<div class="nav">

<button onclick="openTab('dashboard')">Dashboard</button>
<button onclick="openTab('profile')">Profile</button>
<button onclick="openTab('analysis')">Analytics</button>
<button onclick="logout()">Logout</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="tab">

<h3>Customer Reviews</h3>

<input id="search" placeholder="Search reviews..." onkeyup="searchReview()">

<table class="reviewTable">

<thead>

<tr>
<th>#</th>
<th>Name</th>
<th>Contact</th>
<th>Rating</th>
<th>Message</th>
<th>Date</th>
</tr>

</thead>

<tbody id="reviewBody"></tbody>

</table>

</div>



<!-- PROFILE -->

<div id="profile" class="tab">

<h3>Business Profile</h3>

<div class="profileBox">

<label>Customer Code</label>
<input id="code" readonly>

<label>Review Link</label>
<input id="reviewLink" readonly>

<h4>QR Code</h4>

<img id="qr">

<button onclick="downloadQR()" class="btn">Download QR</button>

<p class="linkBox">

Customer Feedback Page

<br>

<a id="feedbackLink" target="_blank"></a>

</p>

</div>

</div>



<!-- ANALYTICS -->

<div id="analysis" class="tab">

<h3>Analytics</h3>

<div class="analytics">

<div class="card">
<h4>Total Reviews</h4>
<p id="total"></p>
</div>

<div class="card positive">
<h4>Positive Reviews</h4>
<p id="positive"></p>
</div>

<div class="card negative">
<h4>Negative Reviews</h4>
<p id="negative"></p>
</div>

</div>

</div>

</div>


<script src="app.js"></script>
</body>
</html>
